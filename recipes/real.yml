# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism

base-image: ghcr.io/butrejp/azure-coreos
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
     # - inject-azurelinux-repos.sh
      - inject-microsoft-repos.sh
     # - override-os-release.sh

  - type: dnf
    group-install:
      with-optional: true
      packages:
        - GNOME Desktop Environment
    install:
      allow-erasing: true
      packages:
        # Azure Linux packages available in the repos
        #- azurelinux-release
        - azurelinux-logos
        - git
        - code
        - powershell-lts
        - microsoft-edge-stable
        - gdm
        - fastfetch

  - type: systemd
    system:
      enabled:
        - gdm.service
  - type: script
    snippets:
      - "sed -i 's|^SHELL=.*|SHELL=/usr/bin/pwsh|' /etc/default/useradd 2>/dev/null || true"

    

  - type: soar
  - type: brew
  - type: signing