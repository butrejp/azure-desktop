# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism, fedora bones (begrudgingly)

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - inject-azurelinux-repos.sh
      - override-os-release.sh

  - type: dnf
    repos:
      files:
        - https://packages.microsoft.com/config/fedora/43/packages-microsoft-prod.rpm
    install:
      packages:
        - pwsh
        - dotnet-sdk-10.0
        - edge




  - type: signing