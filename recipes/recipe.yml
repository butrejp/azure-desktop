# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism, fedora bones (begrudgingly)

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - inject-azurelinux-repos.sh
      - inject-microsoft-repos.sh
      - override-os-release.sh

  - type: dnf
    install:
      allow-erasing: true
      packages:
        # Azure Linux packages available in the repos
        #- azurelinux-release
        - azurelinux-logos

  - type: dnf
    install:
      allow-erasing: true
      packages:
        # Microsoft packages from their Fedora prod repo
        - code
        - powershell-lts
        - microsoft-edge-stable
        # Add more as needed

  - type: dnf
    install:
      allow-erasing: true
      packages:
        - kernel
        - kernel-modules
        - kernel-modules-extra
        - gnome-shell
        - gdm
        - fastfetch
    remove:
      packages:
        - firefox
        - nvtop

  - type: systemd
    system:
      enabled:
        - gdm.service
  - type: script
    snippets:
      - "sed -i 's|^SHELL=.*|SHELL=/usr/bin/pwsh|' /etc/default/useradd 2>/dev/null || true"

    

  - type: soar
  - type: brew
  - type: signing