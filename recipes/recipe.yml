# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism

base-image: ghcr.io/butrejp/azure-coreos
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- Inject Fedora repos ---
  - type: script
    scripts:
      - inject-fedora-repos.sh

  # --- Fix repo files ---
  - type: script
    scripts:
      - fix-fedora-repos.sh

  # --- Replace Azure Linux ostree with Fedora ostree (provides 50ostree dracut module) ---
  - type: dnf
    replace:
      - from-repo: fedora
        allow-erasing: true
        packages:
          - ostree

  # --- Write dracut config BEFORE kernel install triggers auto-dracut ---
  - type: script
    scripts:
      - configure-dracut-ostree.sh

  # --- Replace Azure Linux kernel with Fedora kernel + install desktop ---
  - type: dnf
    replace:
      - from-repo: fedora
        allow-erasing: true
        packages:
          - kernel
          - kernel-modules
    install:
      allow-erasing: true
      packages:
        - kernel-modules-extra
        - gnome-shell
        - gdm

  # --- Safety pass: explicitly regenerate and verify initramfs ---
  - type: script
    scripts:
      - regenerate-initramfs.sh

  - type: systemd
    system:
      enabled:
        - gdm.service

  - type: soar

  - type: signing
