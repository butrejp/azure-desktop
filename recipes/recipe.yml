# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism

base-image: ghcr.io/butrejp/azure-coreos
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- Inject Fedora repos natively via dnf module ---
  # Using the standard Fedora release mirror paths for F43
  - type: dnf
    repos:
      files:
        - https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/f/fedora-repos-43-1.noarch.rpm
        - https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/f/fedora-release-43-1.noarch.rpm
        - https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/f/fedora-gpg-keys-43-1.noarch.rpm
      keys:
        - https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/f/fedora-gpg-keys-43-1.noarch.rpm

  # --- Fix repo files for Azure Linux environment ---
  - type: script
    scripts:
      - fix-fedora-repos.sh

  # --- Install desktop packages from Fedora repos ---
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - gnome-shell
        - gdm

  - type: systemd
    system:
      enabled:
        - gdm.service

  - type: soar

  - type: signing
