# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism

base-image: ghcr.io/butrejp/azure-coreos
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- Inject Fedora repos and keys natively via dnf module ---
  - type: dnf
    repos:
      files:
        - https://kojipkgs.fedoraproject.org/packages/fedora-repos/43/1.3/noarch/fedora-repos-43-1.3.noarch.rpm
        - https://kojipkgs.fedoraproject.org/packages/fedora-release/43/1.3/noarch/fedora-release-43-1.3.noarch.rpm
        - https://kojipkgs.fedoraproject.org/packages/fedora-gpg-keys/43/1.3/noarch/fedora-gpg-keys-43-1.3.noarch.rpm
      keys:
        - https://kojipkgs.fedoraproject.org/packages/fedora-gpg-keys/43/1.3/noarch/fedora-gpg-keys-43-1.3.noarch.rpm
    # Don't auto-remove these repos — we need them for the next dnf module
    cleanup: false

  # --- Fix repo files and disable broken repos via script ---
  - type: script
    scripts:
      - fix-fedora-repos.sh

  # --- Now install desktop packages from Fedora repos ---
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - gnome-shell
        - gdm

  - type: systemd
    system:
      enabled:
        - gdm.service

  - type: soar

  - type: signing
