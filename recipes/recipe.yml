# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism

base-image: ghcr.io/butrejp/azure-coreos
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- Inject Fedora repos ---
  - type: script
    scripts:
      - inject-fedora-repos.sh

  # --- Fix repo files ---
  - type: script
    scripts:
      - fix-fedora-repos.sh

  # --- Swap Azure Linux ostree for Fedora ostree (includes 98ostree dracut module) ---
  - type: dnf
    replace:
      - from-repo: fedora
        allow-erasing: true
        packages:
          - ostree
          - kernel
          - kernel-modules
    install:
      allow-erasing: true
      packages:
        - gnome-shell
        - gdm
        - kernel-modules-extra

  # --- Ensure dracut includes ostree module ---
  - type: script
    scripts:
      - configure-dracut-ostree.sh

  - type: systemd
    system:
      enabled:
        - gdm.service

  - type: soar

  - type: signing
