# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: azure-desktop
description: microsoft maximalism

base-image: ghcr.io/butrejp/azure-coreos
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- Inject Fedora repos ---
  - type: script
    scripts:
      - inject-fedora-repos.sh

  # --- Fix repo files ---
  - type: script
    scripts:
      - fix-fedora-repos.sh

  # --- Replace Azure Linux ostree with Fedora ostree ---
  - type: dnf
    replace:
      - from-repo: fedora
        allow-erasing: true
        packages:
          - ostree

  # --- Write dracut config BEFORE kernel install ---
  - type: script
    scripts:
      - configure-dracut-ostree.sh

  # --- Pre-create Fedora system users that Azure Linux lacks ---
  - type: script
    scripts:
      - create-system-users.sh

  # --- Install Fedora kernel + desktop (single transaction, single version) ---
  - type: dnf
    install:
      allow-erasing: true
      packages:
        - kernel
        - kernel-modules
        - kernel-modules-extra
        - gnome-shell
        - gdm

  # --- Regenerate initramfs for the one kernel ---
  - type: script
    scripts:
      - regenerate-initramfs.sh

  - type: systemd
    system:
      enabled:
        - gdm.service

  - type: soar

  - type: signing