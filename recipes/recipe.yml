---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: azure-desktop
# description will be included in the image's metadata
description: microsoft maximalism

# the base image to build on top of (FROM) and the version tag to use
base-image: mcr.microsoft.com/azurelinux/base/core
image-version: 3.0 

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /
  
  - type: script
    snippets:
      - sudo rpm --import https://packages.microsoft.com/keys/microsoft.asc && echo -e "[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\nautorefresh=1\ntype=rpm-md\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc" | sudo tee /etc/yum.repos.d/vscode.repo > /dev/null

  - type: dnf
    install:
      packages:
        # Core Microsoft applications
        - powershell
        - microsoft-edge-stable
        - code # VS Code
        - azure-cli
        - mssql-cli
        - mdatp
      
        # Desktop Environment packages (Azure Linux 4.0 general-purpose packages)
        - gnome-shell
        - gdm
       - xorg-x11-server-Xorg
       
  - type: systemd
    system:
      enabled:
        - gdm.service
        
  - type: soar


  - type: signing # this sets up the proper policy & signing files for signed images to work fully
